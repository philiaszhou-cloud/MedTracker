name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "Created local.properties with sdk.dir=$ANDROID_HOME"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Check gradlew exists
      run: |
        ls -la gradlew
        head -20 gradlew

    - name: Build debug APK
      run: |
        echo "Starting build..."
        ./gradlew assembleDebug --no-daemon 2>&1; {
          echo "Build failed, showing error output"
          cat app/build/outputs/logs/manifest-merger-debug-report.txt 2>/dev/null; true
        }

    - name: Find and list APK files
      run: |
        echo "Searching for APK files..."
        find . -name "*.apk" -type f -ls 2>/dev/null; echo "No APK files found"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: MedTracker-debug-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30