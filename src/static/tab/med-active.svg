<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 胶囊外形 -->
  <rect x="16" y="4" width="16" height="40" rx="8" stroke="#00FF88" stroke-width="2.5" fill="none" filter="url(#neon)"/>
  <!-- 中间分隔线 -->
  <line x1="16" y1="24" x2="32" y2="24" stroke="#00FF88" stroke-width="2"/>
  <!-- 上半部分填充 -->
  <path d="M16.5 24 L16.5 12 A7.5 7.5 0 0 1 31.5 12 L31.5 24 Z" fill="#00FF88" opacity="0.2"/>
  <!-- 十字标记 -->
  <line x1="24" y1="30" x2="24" y2="38" stroke="#00FF88" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="34" x2="28" y2="34" stroke="#00FF88" stroke-width="2.5" stroke-linecap="round"/>
</svg>
