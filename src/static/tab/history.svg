<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 时钟外圈 -->
  <circle cx="24" cy="24" r="18" stroke="#5B7C8D" stroke-width="2.5" fill="none"/>
  <!-- 时针 -->
  <line x1="24" y1="24" x2="24" y2="14" stroke="#5B7C8D" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 分针 -->
  <line x1="24" y1="24" x2="32" y2="20" stroke="#5B7C8D" stroke-width="2" stroke-linecap="round"/>
  <!-- 中心点 -->
  <circle cx="24" cy="24" r="2" fill="#5B7C8D"/>
  <!-- 12点刻度标记 -->
  <line x1="24" y1="8" x2="24" y2="11" stroke="#5B7C8D" stroke-width="2" stroke-linecap="round"/>
  <!-- 逆时针箭头（历史感） -->
  <path d="M10 12 L6 18 L13 18" stroke="#5B7C8D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
