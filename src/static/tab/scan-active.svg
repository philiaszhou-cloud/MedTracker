<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 四个角（取景框） -->
  <path d="M6 16 L6 6 L16 6" stroke="#00FF88" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon)"/>
  <path d="M42 16 L42 6 L32 6" stroke="#00FF88" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon)"/>
  <path d="M6 32 L6 42 L16 42" stroke="#00FF88" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon)"/>
  <path d="M42 32 L42 42 L32 42" stroke="#00FF88" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon)"/>
  <!-- 中心圆环（镜头） -->
  <circle cx="24" cy="24" r="8" stroke="#00FF88" stroke-width="2.5" fill="rgba(0,255,136,0.1)" filter="url(#neon)"/>
  <!-- 中心点 -->
  <circle cx="24" cy="24" r="3" fill="#00FF88"/>
</svg>
