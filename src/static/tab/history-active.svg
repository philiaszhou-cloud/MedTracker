<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 时钟外圈 -->
  <circle cx="24" cy="24" r="18" stroke="#00FF88" stroke-width="2.5" fill="rgba(0,255,136,0.08)" filter="url(#neon)"/>
  <!-- 时针 -->
  <line x1="24" y1="24" x2="24" y2="14" stroke="#00FF88" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 分针 -->
  <line x1="24" y1="24" x2="32" y2="20" stroke="#00FF88" stroke-width="2" stroke-linecap="round"/>
  <!-- 中心点 -->
  <circle cx="24" cy="24" r="2.5" fill="#00FF88"/>
  <!-- 12点刻度标记 -->
  <line x1="24" y1="8" x2="24" y2="11" stroke="#00FF88" stroke-width="2" stroke-linecap="round"/>
  <!-- 逆时针箭头（历史感） -->
  <path d="M10 12 L6 18 L13 18" stroke="#00FF88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#neon)"/>
</svg>
