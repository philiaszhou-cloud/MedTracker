<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- 终端窗口 - 橙色高亮 -->
  <rect x="9" y="9" width="30" height="30" rx="2.5" stroke="#FF6600" stroke-width="1.8" fill="rgba(255,102,0,0.05)" stroke-dasharray="3 2"/>
  <!-- 标题栏 -->
  <rect x="9" y="9" width="30" height="6" rx="2.5" fill="rgba(255,102,0,0.12)"/>
  <!-- 窗口按钮 - macOS风格 -->
  <circle cx="14.5" cy="12" r="1.4" fill="#FF4444" opacity="0.8"/>
  <circle cx="19.5" cy="12" r="1.4" fill="#FFEE00" opacity="0.8"/>
  <circle cx="24.5" cy="12" r="1.4" fill="#00FF88" opacity="0.7"/>
  <!-- 日志条目 - 渐变透明度 -->
  <rect x="14" y="20" width="16" height="2.8" rx="1.4" fill="#FF6600" opacity="0.95"/>
  <rect x="14" y="26" width="23" height="2.8" rx="1.4" fill="#FF6600" opacity="0.58"/>
  <rect x="14" y="32" width="13" height="2.8" rx="1.4" fill="#FF6600" opacity="0.32"/>
  <!-- 时间戳状态点 -->
  <circle cx="34" cy="21.4" r="1.5" fill="#00FF88" opacity="0.82"/>
  <circle cx="40" cy="27.4" r="1.5" fill="#FF00AA" opacity="0.82"/>
  <circle cx="29" cy="33.4" r="1.5" fill="#00F0FF" opacity="0.62"/>
  <!-- 光标闪烁 -->
  <rect x="29" y="31.5" width="2.2" height="2.8" rx="0.5" fill="#FF6600"/>
</svg>