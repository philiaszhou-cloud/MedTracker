  <!-- 四角括号 -->
  <path d="M7 18 L7 11 L14 11" stroke="#00FF88" stroke-width="2.5" fill="none" stroke-linecap="square"/>
  <path d="M41 18 L41 11 L34 11" stroke="#00FF88" stroke-width="2.5" fill="none" stroke-linecap="square"/>
  <path d="M7 32 L7 39 L14 39" stroke="#00FF88" stroke-width="2.5" fill="none" stroke-linecap="square"/>
  <path d="M41 32 L41 39 L34 39" stroke="#00FF88" stroke-width="2.5" fill="none" stroke-linecap="square"/>
