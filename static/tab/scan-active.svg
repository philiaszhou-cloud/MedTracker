  <circle cx="24" cy="25" r="6" stroke="#00FF88" stroke-width="1.3" fill="none" opacity="0.7"/>
  <line x1="24" y1="17" x2="24" y2="21" stroke="#00FF88" stroke-width="1.8"/>
  <line x1="24" y1="29" x2="24" y2="33" stroke="#00FF88" stroke-width="1.8"/>
  <line x1="16" y1="25" x2="20" y2="25" stroke="#00FF88" stroke-width="1.8"/>
  <line x1="28" y1="25" x2="32" y2="25" stroke="#00FF88" stroke-width="1.8"/>
  <circle cx="24" cy="25" r="1.8" fill="#00FF88"/>
  <!-- HUD数据 -->
  <text x="8" y="44" font-size="4.5" fill="#00FF88" opacity="0.55" font-family="monospace">SCAN</text>
  <text x="34" y="44" font-size="4.5" fill="#00FF88" opacity="0.55" font-family="monospace">AI</text>
  <!-- 顶部摄像头指示灯 -->
  <circle cx="24" cy="7" r="2" fill="#FFEE00" opacity="0.85"/>
